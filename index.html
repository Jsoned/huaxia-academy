<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>华夏学堂 - 3D历史语文益智学习</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{gold:'#D4A574','gold-light':'#E8D5B7','deep-blue':'#0a0a1a','deep-blue-light':'#1a1a2e'},fontFamily:{serif:['Noto Serif SC','SimSun','serif'],sans:['Noto Sans SC','Microsoft YaHei','sans-serif']}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>body{background:#0a0a1a;color:#E8D5B7;font-family:'Noto Sans SC',sans-serif;margin:0;overflow-x:hidden}.font-serif{font-family:'Noto Serif SC',serif}.gold{color:#D4A574}.glass{background:rgba(26,26,46,.9);border:1px solid rgba(212,165,116,.2);backdrop-filter:blur(10px)}.btn-gold{background:linear-gradient(135deg,#8B4513,#D4A574);color:#0a0a1a;font-weight:700;padding:12px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .3s}.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(212,165,116,.4)}.card-hover{transition:all .3s}.card-hover:hover{transform:translateY(-4px)}#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}.page{position:relative;z-index:1;min-height:100vh}</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="app" class="page"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
